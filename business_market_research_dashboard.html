  function groupBy(arr, keyFn) {
    const map = new Map();
    arr.forEach((item) => {

      map.get(key).push(item);

  function demoInsights() {
    const items = applyDemoFilters();

    const years = [...groupBy(items, i => i.incorporation_year).entries()].filter(([y]) => y).sort((a,b) => Number(a[0]) - Number(b[0]));
    const trend = years.map(([year, rows]) => ({ year: Number(year), count: rows.length }));
    const maxYear = trend.length ? trend[trend.length - 1].year : new Date().getFullYear();
    const recentStart = maxYear - 1, prevStart = maxYear - 3, prevEnd = maxYear - 2;
    function groupStats(map, labelName) {
      return [...map.entries()].map(([label, rows]) => {
        const count = rows.length;
        const active = rows.filter(r => r.status_category === "Active").length;
        const risk = rows.filter(r => NEGATIVE_CATEGORIES.has(r.status_category)).length;
        const recent = rows.filter(r => r.incorporation_year >= recentStart && r.incorporation_year <= maxYear).length;
        const previous = rows.filter(r => r.incorporation_year >= prevStart && r.incorporation_year <= prevEnd).length;
        const growth = previous ? Number((((recent - previous) / previous) * 100).toFixed(1)) : null;
        const activeRate = Number(pct(active, count)), riskRate = Number(pct(risk, count));
        const growthBonus = previous === 0 && recent > 0 ? 20 : Math.max(-20, Math.min(30, (growth || 0) / 4));
        const score = Number((recent * 1.8 + activeRate * .35 - riskRate * .9 + growthBonus - Math.log10(Math.max(count,1))*3.5).toFixed(1));
        return { [labelName]: label, count, active_count: active, risk_count: risk, recent_count: recent, previous_count: previous, growth_pct: growth, active_rate: activeRate, risk_rate: riskRate, opportunity_score: score };
      }).sort((a,b) => b.count - a.count);
    }
    const towns = groupStats(groupBy(items, i => i.town), "town");
    const sectors = groupStats(groupBy(items, i => i.sic_text), "sic_text");

      trend.length >= 2 ? { sentiment: trend[trend.length-1].count >= trend[trend.length-2].count ? "positive" : "negative", title: "Latest formation pulse", value: `${trend[trend.length-1].year}: ${trend[trend.length-1].count}`, note: `Versus ${trend[trend.length-2].year}: ${trend[trend.length-2].count}.` } : { sentiment: "neutral", title: "Formation pulse", value: "Not enough years", note: "Use the live dataset for a stronger signal." },
      towns[0] ? { sentiment: "positive", title: "Where to look first", value: towns.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score)[0].town, note: "Highest opportunity score in the filtered demo set." } : { sentiment: "neutral", title: "No location", value: "—", note: "Broaden the search." }
    ];
    return { total_count: total, max_incorporation_year: maxYear, comparison_window: { recent: `${recentStart}-${maxYear}`, previous: `${prevStart}-${prevEnd}` }, status: { categories: categoryCounts, raw: [] }, trend, towns, sectors, rankings: { towns_by_opportunity: towns.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score), towns_by_risk: towns.slice().sort((a,b)=>b.risk_rate-a.risk_rate), sectors_by_opportunity: sectors.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score), sectors_by_risk: sectors.slice().sort((a,b)=>b.risk_rate-a.risk_rate) }, heatmap: { points, full_match_count: total, plotted_cells: points.length, note: "Demo points are fictional; live mode uses aggregated postcode districts." }, eureka };

  }

  function renderOpportunity() {
    const ins = state.insights;
    if (!ins) { els.opportunity.innerHTML = `<div class="rg-loading">Scoring opportunities…</div>`; return; }
    els.opportunity.innerHTML = `
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Where to attack</h3><p class="rg-section-sub">Locations ranked by the opportunity score. Treat this as a shortlist generator for deeper research.</p>${renderTable(ins.rankings?.towns_by_opportunity || [], 'town', 15)}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Where to be careful</h3><p class="rg-section-sub">High stress can reveal weak economics, oversupply, or a chance to buy/partner if you understand the cause.</p>${renderTable(ins.rankings?.towns_by_risk || [], 'town', 15)}</div>
      </div>
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Sector opportunities</h3>${renderTable(ins.rankings?.sectors_by_opportunity || [], 'sector', 15)}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Sector stress</h3>${renderTable(ins.rankings?.sectors_by_risk || [], 'sector', 15)}</div>
      </div>
      <p class="rg-footnote">Score formula is intentionally transparent: recent formation, active-rate and low-risk signals lift the score; saturation and status stress reduce it. Change the formula in companies_house_market_server.py for your own thesis.</p>`;
  }

  function showDetail(item) {
    if (!item) return;
    const m = metaFor(item.status_category);
    els.detail.innerHTML = `<h3>${escapeHtml(item.company_name)}</h3>
      <div class="rg-detail-row">Company no. <b>${escapeHtml(item.company_number)}</b></div>
      <div class="rg-detail-row">Status <b style="color:${m.color}">${escapeHtml(item.status)}</b></div>
      <div class="rg-detail-row">Incorporated <b>${escapeHtml(item.incorporation_date || '—')}</b></div>
      <div class="rg-detail-row">Town / postcode <b>${escapeHtml(item.town || '')} ${escapeHtml(item.postcode || '')}</b></div>
      <div class="rg-detail-row">SIC <b>${escapeHtml(item.sic_text || '—')}</b></div>
      <p class="rg-footnote">Use this company as a qualitative lead: check website, offer, reviews, pricing, hiring and filings before making strategic decisions.</p>`;
  }
  function renderList() {
    const items = state.items || [], total = state.total || 0;
    els.count.textContent = items.length === total ? `${fmt(total)} registered businesses found` : `Showing ${fmt(items.length)} of ${fmt(total)} matches. Insights above use the full ${fmt(total)}.`;
    if (!items.length) { els.list.innerHTML = `<div class="rg-empty">No matches. Try a broader keyword or clear the place filter.</div>`; return; }
    const rows = items.map((item, idx) => {
      const m = metaFor(item.status_category);
      return `<button class="rg-card ${idx === selectedIndex ? 'selected' : ''}" data-idx="${idx}"><div class="rg-card-name">${escapeHtml(item.company_name)}</div><div class="rg-card-meta"><span class="rg-pill" style="background:${m.color}22;color:${m.color};border-color:${m.color}">${m.chip}</span><span>${escapeHtml(item.company_number)}</span><span>${escapeHtml(item.incorporation_date || '')}</span></div><div class="rg-card-sic">${escapeHtml(item.sic_text || '')} · ${escapeHtml(item.town || '')} ${escapeHtml(item.postcode || '')}</div></button>`;
    }).join('');
    const loadMore = (isLive && items.length < total) ? `<button class="rg-loadmore" id="rg-loadmore">Load more (${fmt(total - items.length)} remaining)</button>` : "";
    els.list.innerHTML = rows + loadMore;
    els.list.querySelectorAll('.rg-card').forEach(btn => btn.addEventListener('click', () => { selectedIndex = Number(btn.dataset.idx); renderList(); showDetail(state.items[selectedIndex]); }));
    const more = els.list.querySelector('#rg-loadmore');
    if (more) more.addEventListener('click', () => doSearch(false));
  }

  async function loadInsights() {
    state.insights = isLive ? await fetchLiveInsights() : demoInsights();
    renderRadar(); renderTrends(); renderOpportunity(); renderHeatMap();
  }
  async function doSearch(reset) {
    if (reset) { state.offset = 0; state.items = []; selectedIndex = null; els.detail.innerHTML = `<h3>Select a company</h3><p class="rg-detail-row">Use this tab to inspect the rows behind the market signal.</p>`; }
    setLiveBadge();
    if (isLive) {
      const data = await fetchLivePage(reset);
      state.total = data.total_count || 0;
      state.items = reset ? (data.results || []) : state.items.concat(data.results || []);
      state.offset = state.items.length;
    } else {
      const filtered = applyDemoFilters();
      state.total = filtered.length;
      state.items = filtered;
    }
    renderList();
    if (reset) await loadInsights();
    els.export.href = isLive ? ("/api/export.csv?" + paramsToQuery({ limit: 50000 })) : "#";
  }

  function debounce(fn, ms) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
  const debouncedSearch = debounce(() => doSearch(true), 220);
  // Populate the status dropdown with checkboxes and wire the search button.
  if (els.statusMenu && els.statusToggle) {
    const cats = [''].concat(Object.keys(STATUS_CATEGORIES));
    els.statusMenu.innerHTML = cats.map(cat => {
      const key = cat === '' ? '' : cat;
      const label = cat === '' ? 'All status' : metaFor(cat).chip;
      const checked = cat === '' ? 'checked' : '';
      return `<label><input type="checkbox" data-cat="${key}" ${checked} /> ${label}</label>`;
    }).join('');
    const checkboxes = Array.from(els.statusMenu.querySelectorAll('input[type=checkbox]'));
    function updateFromCheckboxes() {
      const allBox = checkboxes.find(cb => cb.dataset.cat === '');
      const others = checkboxes.filter(cb => cb.dataset.cat !== '');
      if (allBox && allBox.checked) {
        others.forEach(cb => cb.checked = false);
        categoryFilter = [];
        els.statusToggle.textContent = 'All status ▾';
      } else {
        const selected = others.filter(cb => cb.checked).map(cb => cb.dataset.cat);
        categoryFilter = selected;
        els.statusToggle.textContent = selected.length ? selected.map(s => metaFor(s).chip).join(', ') + ' ▾' : 'All status ▾';
      }
    }
    checkboxes.forEach(cb => cb.addEventListener('change', (e) => {
      if (cb.dataset.cat === '' && cb.checked) {
        // uncheck others
        checkboxes.forEach(c => { if (c.dataset.cat !== '') c.checked = false; });
      }
      if (cb.dataset.cat !== '' && cb.checked) {
        const allCb = checkboxes.find(c => c.dataset.cat === ''); if (allCb) allCb.checked = false;
      }
      updateFromCheckboxes();
    }));
    // Initialize toggle text based on initial checkbox state
    updateFromCheckboxes();
    els.statusToggle.addEventListener('click', (e) => {
      const isHidden = els.statusMenu.hasAttribute('hidden');
      if (isHidden) { els.statusMenu.removeAttribute('hidden'); } else { els.statusMenu.setAttribute('hidden', ''); }
      els.statusToggle.setAttribute('aria-expanded', String(!isHidden));
    });
    document.addEventListener('click', (e) => {
      if (!root.querySelector('#rg-status-dropdown').contains(e.target)) {
        els.statusMenu.setAttribute('hidden', '');
        els.statusToggle.setAttribute('aria-expanded', 'false');
      }
    });
  }
  if (els.searchBtn) els.searchBtn.addEventListener('click', async () => {
    // Run the search
    await doSearch(true);
    // Switch to Explore panel to show results
    setTimeout(() => {
      Array.from(els.mainMenu).forEach(b => b.classList.remove('active'));
      Array.from(els.menuPanels).forEach(p => p.classList.remove('active'));
      const exploreBtn = Array.from(els.mainMenu).find(b => b.dataset.menu === 'explore');
      const explorePanel = root.querySelector('#rg-menu-explore');
      if (exploreBtn) exploreBtn.classList.add('active');
      if (explorePanel) explorePanel.classList.add('active');
      // Trigger initial render of explore content
      renderKpis(); renderEureka(); renderBars(); renderTrendChart(); renderRadar();
    }, 100);
  });
  // Set up town autocomplete
  const uniqueTowns = [...new Set(DEMO_DATA.map(d => d.town).sort())];
  // Set up Explore page town filter with autocomplete
  if (els.explorePlace && els.exploreAutocomplete) {
    function showPlaceSuggestions(value) {
      const filtered = value.trim().length > 0
        ? uniqueTowns.filter(town => town.toLowerCase().includes(value.toLowerCase()))
        : [];
      if (filtered.length > 0) {
        els.exploreAutocomplete.innerHTML = filtered.map(town =>
          `<div class="rg-place-option">${escapeHtml(town)}</div>`
        ).join('');
        els.exploreAutocomplete.classList.add('active');
      } else {
        els.exploreAutocomplete.classList.remove('active');
      }
    }
    els.explorePlace.addEventListener('input', (e) => {
      showPlaceSuggestions(e.target.value);
      // Re-render with new filter
      renderList();
      renderKpis(); renderEureka(); renderBars(); renderTrendChart(); renderRadar();
    });
    els.explorePlace.addEventListener('focus', (e) => {
      showPlaceSuggestions(e.target.value);
    });
    els.exploreAutocomplete.addEventListener('click', (e) => {
      if (e.target.classList.contains('rg-place-option')) {
        els.explorePlace.value = e.target.textContent;
        els.exploreAutocomplete.classList.remove('active');
        // Re-render with selected town
        renderList();
        renderKpis(); renderEureka(); renderBars(); renderTrendChart(); renderRadar();
      }
    });
    document.addEventListener('click', (e) => {
      if (!els.explorePlace.contains(e.target) && !els.exploreAutocomplete.contains(e.target)) {
        els.exploreAutocomplete.classList.remove('active');
      }
    });
  }
  els.heatMode.addEventListener('change', renderHeatMap);
  root.querySelectorAll('.rg-tab').forEach(tab => tab.addEventListener('click', () => {
    root.querySelectorAll('.rg-tab').forEach(t => t.classList.toggle('active', t === tab));
    root.querySelectorAll('.rg-panel').forEach(p => p.classList.remove('active'));
    root.querySelector(`#rg-panel-${tab.dataset.tab}`).classList.add('active');
    if (tab.dataset.tab === 'heatmap') setTimeout(() => { initHeatMap(); heatMap.invalidateSize(); renderHeatMap(); }, 60);
  }));
  els.export.addEventListener('click', (e) => { if (!isLive) { e.preventDefault(); alert('CSV export is available when the Flask server is running with live data.'); } });
  els.mainMenu.forEach(btn => btn.addEventListener('click', () => {
    els.mainMenu.forEach(b => b.classList.toggle('active', b === btn));
    els.menuPanels.forEach(panel => panel.classList.toggle('active', panel.id === `rg-menu-${btn.dataset.menu}`));
    if (btn.dataset.menu === 'explore') {
      setTimeout(() => {
        initHeatMap();
        heatMap.invalidateSize();
        renderHeatMap();
      }, 60);
    }
  }));

  checkLiveSource().then(() => doSearch(true));
})();
</script>
