<script>
(function () {
  const STATUS_CATEGORIES = {
    "Active": ["Active"],
    "Active - At Risk": ["Active - Proposal to Strike off", "Live but Receiver Manager on at least one charge"],
    "Insolvency - Voluntary Arrangement": ["Voluntary Arrangement", "VOLUNTARY ARRANGEMENT / ADMINISTRATIVE RECEIVER", "VOLUNTARY ARRANGEMENT / RECEIVER MANAGER"],
    "Insolvency - Administration/Receivership": ["In Administration", "In Administration/Administrative Receiver", "In Administration/Receiver Manager", "ADMINISTRATION ORDER", "ADMINISTRATIVE RECEIVER", "RECEIVER MANAGER / ADMINISTRATIVE RECEIVER", "RECEIVERSHIP"],
    "Liquidation": ["Liquidation"],
  };
  const STATUS_TO_CATEGORY = {};
  Object.entries(STATUS_CATEGORIES).forEach(([cat, raws]) => raws.forEach((r) => { STATUS_TO_CATEGORY[r] = cat; }));
  const NEGATIVE_CATEGORIES = new Set(["Active - At Risk", "Insolvency - Voluntary Arrangement", "Insolvency - Administration/Receivership", "Liquidation"]);
  function categoryOf(rawStatus) { return STATUS_TO_CATEGORY[rawStatus] || "Other"; }
  const CATEGORY_META = {
    "Active": { color: "#5FA8A0", chip: "Active" },
    "Active - At Risk": { color: "#C99A4B", chip: "At risk" },
    "Insolvency - Voluntary Arrangement": { color: "#D98E4A", chip: "Voluntary arr." },
    "Insolvency - Administration/Receivership": { color: "#C1574A", chip: "Admin/Receiver" },
    "Liquidation": { color: "#8B2E2E", chip: "Liquidation" },
    "Other": { color: "#8B94A3", chip: "Other" },
  };
  function metaFor(category) { return CATEGORY_META[category] || CATEGORY_META.Other; }

  const CITY_COORDS = {
    LONDON: [51.539, -0.139], MANCHESTER: [53.4808, -2.2426], BRISTOL: [51.4545, -2.5879],
    EDINBURGH: [55.9533, -3.1883], LEEDS: [53.8008, -1.5491], BRIGHTON: [50.8225, -0.1372],
    GLASGOW: [55.8642, -4.2518], BIRMINGHAM: [52.4862, -1.8904], CARDIFF: [51.4816, -3.1791], NEWCASTLE: [54.9783, -1.6178],
    OXFORD: [51.752, -1.2577], CAMBRIDGE: [52.2053, 0.1218], SHEFFIELD: [53.3811, -1.4701], LIVERPOOL: [53.4084, -2.9916]
  };
  const RAW = [
    ["CORE & FLOW PILATES STUDIO LTD","09812345","Active","2019-03-14","LONDON","NW1 8QH","93130 - Operation of sports facilities"],
    ["CAMDEN PILATES LAB LTD","11778899","Active","2022-06-12","LONDON","NW1 9AL","93130 - Operation of sports facilities"],
    ["CAMDEN BEAN COFFEE ROASTERS LTD","07712233","Active","2014-04-01","LONDON","NW1 7JR","56101 - Licensed restaurants"],
    ["RIVERSIDE PILATES MANCHESTER LTD","10456721","Active","2021-07-02","MANCHESTER","M3 4EN","93130 - Operation of sports facilities"],
    ["NORTHERN QUARTER SOFTWARE LTD","11456789","Active","2021-11-05","MANCHESTER","M1 1FT","62012 - Business and domestic software development"],
    ["MANCHESTER MARKETING HOUSE LTD","09556677","Voluntary Arrangement","2012-09-08","MANCHESTER","M2 5BQ","73110 - Advertising agencies"],
    ["PILATES & CO BRISTOL LTD","11023456","Active","2022-01-20","BRISTOL","BS1 5TY","96040 - Physical well-being activities"],
    ["BRISTOL HARBOUR BAKERY LTD","08901122","Active - Proposal to Strike off","2017-06-23","BRISTOL","BS1 6XN","10712 - Manufacture of cakes and pastry goods"],
    ["EDINBURGH PILATES COLLECTIVE LTD","08234567","Liquidation","2015-05-11","EDINBURGH","EH1 2NG","93130 - Operation of sports facilities"],
    ["OLD TOWN PRINT CO LTD","06554433","In Administration","2009-02-17","EDINBURGH","EH8 9YL","18129 - Printing nec"],
    ["LEEDS REFORMER PILATES LTD","12001234","Active","2023-02-08","LEEDS","LS1 4DY","96040 - Physical well-being activities"],
    ["LEEDS DIGITAL STUDIO LTD","11890011","Active","2022-08-14","LEEDS","LS2 7HY","62012 - Business and domestic software development"],
    ["BRIGHTON BEACH PILATES STUDIO LTD","09988776","Active","2018-11-30","BRIGHTON","BN1 1UB","93130 - Operation of sports facilities"],
    ["BRIGHTON VINTAGE RECORDS LTD","09345566","Active","2016-10-09","BRIGHTON","BN1 4ED","47630 - Retail sale of music and video"],
    ["GLASGOW PILATES ROOM LTD","10765432","Active","2020-09-17","GLASGOW","G1 2FF","96040 - Physical well-being activities"],
    ["CLYDESIDE CONSTRUCTION LTD","07223344","RECEIVERSHIP","2013-01-30","GLASGOW","G2 3DB","41202 - Construction of commercial buildings"],
    ["BIRMINGHAM YOGA & WELLNESS LTD","10334455","Active","2020-03-03","BIRMINGHAM","B1 1AA","96040 - Physical well-being activities"],
    ["BIRMINGHAM PILATES & BARRE LTD","12223344","Active","2024-01-09","BIRMINGHAM","B2 4QA","96040 - Physical well-being activities"],
    ["CARDIFF BAY CAFE LTD","08667788","Active","2018-02-27","CARDIFF","CF10 4PA","56101 - Licensed restaurants"],
    ["NEWCASTLE PILATES STUDIO LTD","12112233","Active","2023-05-19","NEWCASTLE","NE1 4ST","93130 - Operation of sports facilities"],
    ["OXFORD AI RESEARCH HOUSE LTD","13330001","Active","2024-03-08","OXFORD","OX1 2JD","72190 - Other research and experimental development on natural sciences and engineering"],
    ["CAMBRIDGE DATA LABS LTD","13330002","Active","2023-12-18","CAMBRIDGE","CB2 1TN","62012 - Business and domestic software development"],
    ["SHEFFIELD FITNESS TECH LTD","13330003","Active","2024-05-02","SHEFFIELD","S1 2HH","62012 - Business and domestic software development"],
    ["LIVERPOOL WELLNESS ROOMS LTD","13330004","Active - Proposal to Strike off","2021-04-11","LIVERPOOL","L1 8JQ","96040 - Physical well-being activities"]
  ];
  const DEMO_DATA = RAW.map((r, i) => {
    const [company_name, company_number, status, incorporation_date, town, postcode, sic_text] = r;
    const base = CITY_COORDS[town] || [54.5, -3];
    const jitter = ((i * 37) % 13 - 6) / 700;
    return { company_name, company_number, status, status_category: categoryOf(status), incorporation_date, incorporation_year: Number((incorporation_date || '').slice(0,4)), town, postcode, sic_text, lat: base[0] + jitter, lon: base[1] - jitter };
  });

  const root = document.getElementById("register-app");
  const categoryButtons = ["", ...Object.keys(STATUS_CATEGORIES)].map((cat) => {
    const label = cat === "" ? "All status" : metaFor(cat).chip;
    const colorVar = cat === "" ? "" : `style="--cat-color:${metaFor(cat).color}"`;
    return `<button class="rg-status-btn ${cat === "" ? "active" : ""}" data-category="${cat}" ${colorVar}>${label}</button>`;
  }).join("");

  root.innerHTML = `
    <div class="rg-header">
      <p class="rg-eyebrow">UK Market Intelligence — Companies House</p>
      <h2 class="rg-title">Market Research Radar</h2>
      <p class="rg-subtitle">Search a sector, town or postcode and get full-population insight: density heatmap, formation pulse, opportunity pockets, stress signals and the companies behind the pattern.</p>
    </div>
    <div class="rg-banner">
      <span class="rg-stamp-badge" id="rg-source-badge">DEMO DATA</span>
      <span><b>Insight mode:</b> the company list is paginated for speed, but the new radar, heatmap and trend tabs calculate over the full matching search universe.</span>
    </div>
    <div class="rg-controls">
      <input type="text" id="rg-q" placeholder='Sector or keyword: "pilates", "software", "bakery"…' />
      <input type="text" id="rg-place" placeholder="Town, postcode, postcode district" />
      <a href="#" class="rg-export" id="rg-export">Export CSV <span style="opacity:.7">(first 50k)</span></a>
      <div class="rg-status-group" id="rg-status-group">${categoryButtons}</div>
    </div>
    <div class="rg-tabs" role="tablist">
      <button class="rg-tab active" data-tab="radar">Market Radar</button>
      <button class="rg-tab" data-tab="heatmap">Heat Map</button>
      <button class="rg-tab" data-tab="trends">Time Trend</button>
      <button class="rg-tab" data-tab="opportunity">Opportunity Finder</button>
      <button class="rg-tab" data-tab="companies">Companies</button>
    </div>
    <section class="rg-panel active" id="rg-panel-radar"><div class="rg-loading">Building market radar…</div></section>
    <section class="rg-panel" id="rg-panel-heatmap">
      <div class="rg-map-layout">
        <div class="rg-map-card">
          <div class="rg-map-tools">
            <select id="rg-heat-mode"><option value="count">Density</option><option value="recent_count">Recent formation</option><option value="risk_count">Stress / risk</option></select>
          </div>
          <div id="rg-heatmap"></div>
        </div>
        <div id="rg-heat-summary" class="rg-cardbox"><div class="rg-loading">Loading heatmap…</div></div>
      </div>
    </section>
    <section class="rg-panel" id="rg-panel-trends"><div class="rg-loading">Building trend view…</div></section>
    <section class="rg-panel" id="rg-panel-opportunity"><div class="rg-loading">Scoring opportunities…</div></section>
    <section class="rg-panel" id="rg-panel-companies">
      <p class="rg-count" id="rg-count"></p>
      <div class="rg-list-wrap">
        <div class="rg-list" id="rg-list"><div class="rg-loading">Checking data source…</div></div>
        <div class="rg-detail" id="rg-detail"><h3>Select a company</h3><p class="rg-detail-row">Use this tab to inspect the rows behind the market signal.</p></div>
      </div>
    </section>
  `;

  const els = {
    q: root.querySelector("#rg-q"), place: root.querySelector("#rg-place"), export: root.querySelector("#rg-export"),
    statusGroup: root.querySelector("#rg-status-group"), badge: root.querySelector("#rg-source-badge"), count: root.querySelector("#rg-count"),
    list: root.querySelector("#rg-list"), detail: root.querySelector("#rg-detail"), heatSummary: root.querySelector("#rg-heat-summary"), heatMode: root.querySelector("#rg-heat-mode"),
    radar: root.querySelector("#rg-panel-radar"), trends: root.querySelector("#rg-panel-trends"), opportunity: root.querySelector("#rg-panel-opportunity"), heatPanel: root.querySelector("#rg-panel-heatmap")
  };

  let isLive = false, categoryFilter = "", selectedIndex = null;
  const PAGE_SIZE = 200;
  const state = { items: [], total: 0, offset: 0, insights: null };
  let heatMap = null, heatLayers = [];

  function fmt(n) { return Number(n || 0).toLocaleString(); }
  function pct(n, d) { return d ? ((n / d) * 100).toFixed(1) : "0.0"; }
  function escapeHtml(str) { return String(str ?? "").replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  function params() { return { q: els.q.value.trim(), place: els.place.value.trim(), category: categoryFilter }; }
  function paramsToQuery(extra = {}) { const p = new URLSearchParams({ ...params(), ...extra }); return p.toString(); }
  function setLiveBadge() { els.badge.textContent = isLive ? "LIVE API" : "DEMO DATA"; els.badge.classList.toggle("live", isLive); }

  async function checkLiveSource() {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 1200);
      const res = await fetch("/api/search?limit=1", { signal: ctrl.signal });
      clearTimeout(t);
      if (res.ok) isLive = true;
    } catch (e) {}
    setLiveBadge();
  }

  async function fetchLivePage(reset) {
    const offset = reset ? 0 : state.offset;
    const res = await fetch("/api/search?" + paramsToQuery({ limit: PAGE_SIZE, offset, geocode: "0" }));
    if (!res.ok) return { results: [], total_count: 0, offset, limit: PAGE_SIZE };
    return await res.json();
  }
  async function fetchLiveInsights() {
    const res = await fetch("/api/insights?" + paramsToQuery({ heatmap_limit: 900, min_group: 2 }));
    if (!res.ok) return null;
    return await res.json();
  }

  function applyDemoFilters() {
    const q = els.q.value.trim().toLowerCase();
    const place = els.place.value.trim().toLowerCase();
    return DEMO_DATA.filter((item) => {
      const matchesQ = !q || item.company_name.toLowerCase().includes(q) || (item.sic_text || "").toLowerCase().includes(q);
      const matchesPlace = !place || (item.town || "").toLowerCase().includes(place) || (item.postcode || "").toLowerCase().includes(place);
      const matchesCategory = !categoryFilter || item.status_category === categoryFilter;
      return matchesQ && matchesPlace && matchesCategory;
    });
  }

  function groupBy(arr, keyFn) {
    const map = new Map();
    arr.forEach((item) => {
      const key = keyFn(item) || "UNKNOWN";
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(item);
    });
    return map;
  }
  function demoInsights() {
    const items = applyDemoFilters();
    const total = items.length;
    const categoryCounts = {};
    items.forEach(i => { categoryCounts[i.status_category] = (categoryCounts[i.status_category] || 0) + 1; });
    const years = [...groupBy(items, i => i.incorporation_year).entries()].filter(([y]) => y).sort((a,b) => Number(a[0]) - Number(b[0]));
    const trend = years.map(([year, rows]) => ({ year: Number(year), count: rows.length }));
    const maxYear = trend.length ? trend[trend.length - 1].year : new Date().getFullYear();
    const recentStart = maxYear - 1, prevStart = maxYear - 3, prevEnd = maxYear - 2;
    function groupStats(map, labelName) {
      return [...map.entries()].map(([label, rows]) => {
        const count = rows.length;
        const active = rows.filter(r => r.status_category === "Active").length;
        const risk = rows.filter(r => NEGATIVE_CATEGORIES.has(r.status_category)).length;
        const recent = rows.filter(r => r.incorporation_year >= recentStart && r.incorporation_year <= maxYear).length;
        const previous = rows.filter(r => r.incorporation_year >= prevStart && r.incorporation_year <= prevEnd).length;
        const growth = previous ? Number((((recent - previous) / previous) * 100).toFixed(1)) : null;
        const activeRate = Number(pct(active, count)), riskRate = Number(pct(risk, count));
        const growthBonus = previous === 0 && recent > 0 ? 20 : Math.max(-20, Math.min(30, (growth || 0) / 4));
        const score = Number((recent * 1.8 + activeRate * .35 - riskRate * .9 + growthBonus - Math.log10(Math.max(count,1))*3.5).toFixed(1));
        return { [labelName]: label, count, active_count: active, risk_count: risk, recent_count: recent, previous_count: previous, growth_pct: growth, active_rate: activeRate, risk_rate: riskRate, opportunity_score: score };
      }).sort((a,b) => b.count - a.count);
    }
    const towns = groupStats(groupBy(items, i => i.town), "town");
    const sectors = groupStats(groupBy(items, i => i.sic_text), "sic_text");
    const points = items.map(i => ({ outcode: (i.postcode || '').split(' ')[0], postcode: i.postcode, lat: i.lat, lon: i.lon, count: 1, risk_count: NEGATIVE_CATEGORIES.has(i.status_category) ? 1 : 0, recent_count: i.incorporation_year >= recentStart ? 1 : 0, intensity: 1 }));
    const active = categoryCounts.Active || 0;
    const eureka = [
      { sentiment: active / Math.max(total, 1) >= .85 ? "positive" : "warning", title: "Market health", value: `${pct(active,total)}% active`, note: `${fmt(total-active)} companies are outside the clean Active bucket.` },
      trend.length >= 2 ? { sentiment: trend[trend.length-1].count >= trend[trend.length-2].count ? "positive" : "negative", title: "Latest formation pulse", value: `${trend[trend.length-1].year}: ${trend[trend.length-1].count}`, note: `Versus ${trend[trend.length-2].year}: ${trend[trend.length-2].count}.` } : { sentiment: "neutral", title: "Formation pulse", value: "Not enough years", note: "Use the live dataset for a stronger signal." },
      towns[0] ? { sentiment: "positive", title: "Where to look first", value: towns.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score)[0].town, note: "Highest opportunity score in the filtered demo set." } : { sentiment: "neutral", title: "No location", value: "—", note: "Broaden the search." }
    ];
    return { total_count: total, max_incorporation_year: maxYear, comparison_window: { recent: `${recentStart}-${maxYear}`, previous: `${prevStart}-${prevEnd}` }, status: { categories: categoryCounts, raw: [] }, trend, towns, sectors, rankings: { towns_by_opportunity: towns.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score), towns_by_risk: towns.slice().sort((a,b)=>b.risk_rate-a.risk_rate), sectors_by_opportunity: sectors.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score), sectors_by_risk: sectors.slice().sort((a,b)=>b.risk_rate-a.risk_rate) }, heatmap: { points, full_match_count: total, plotted_cells: points.length, note: "Demo points are fictional; live mode uses aggregated postcode districts." }, eureka };
  }

  function renderKpis(ins) {
    const total = ins.total_count || 0;
    const cat = ins.status?.categories || {};
    const active = cat.Active || 0;
    const risk = Object.keys(cat).filter(k => NEGATIVE_CATEGORIES.has(k)).reduce((s,k)=>s+cat[k],0);
    const trend = ins.trend || [];
    const latest = trend.length ? trend[trend.length-1] : {year:'—', count:0};
    const topTown = (ins.rankings?.towns_by_opportunity || [])[0];
    return `
      <div class="rg-grid rg-kpis">
        <div class="rg-cardbox"><div class="rg-kpi-label">Total market</div><div class="rg-kpi-value">${fmt(total)}</div><div class="rg-kpi-note">Full matching universe</div></div>
        <div class="rg-cardbox"><div class="rg-kpi-label">Active health</div><div class="rg-kpi-value">${pct(active,total)}%</div><div class="rg-kpi-note">Active status share</div></div>
        <div class="rg-cardbox"><div class="rg-kpi-label">Stress signal</div><div class="rg-kpi-value">${pct(risk,total)}%</div><div class="rg-kpi-note">At-risk/insolvency/liquidation</div></div>
        <div class="rg-cardbox"><div class="rg-kpi-label">Latest year</div><div class="rg-kpi-value">${fmt(latest.count)}</div><div class="rg-kpi-note">Incorporated in ${latest.year}</div></div>
        <div class="rg-cardbox"><div class="rg-kpi-label">Best pocket</div><div class="rg-kpi-value">${escapeHtml(topTown ? topTown.town : '—')}</div><div class="rg-kpi-note">By opportunity score</div></div>
      </div>`;
  }

  function renderEureka(ins) {
    const cards = ins.eureka || [];
    return `<div class="rg-grid rg-eureka">${cards.map(c => `
      <div class="rg-cardbox ${escapeHtml(c.sentiment)}"><div class="rg-eureka-title">${escapeHtml(c.title)}</div><div class="rg-eureka-value">${escapeHtml(c.value)}</div><div class="rg-eureka-note">${escapeHtml(c.note)}</div></div>
    `).join('')}</div>`;
  }

  function renderBars(items, labelKey, valueKey, options = {}) {
    const rows = (items || []).slice(0, options.limit || 8);
    const max = Math.max(1, ...rows.map(r => Number(r[valueKey] || 0)));
    if (!rows.length) return `<div class="rg-empty">No data yet.</div>`;
    return `<div class="rg-bars">${rows.map(r => `
      <div class="rg-bar-row"><div class="rg-bar-label" title="${escapeHtml(r[labelKey])}">${escapeHtml(r[labelKey])}</div><div class="rg-bar-track"><div class="rg-bar-fill ${options.risk ? 'risk' : ''}" style="width:${Math.max(2, (Number(r[valueKey] || 0) / max) * 100)}%"></div></div><div class="num">${fmt(r[valueKey])}</div></div>
    `).join('')}</div>`;
  }

  function renderTrendChart(trend) {
    trend = (trend || []).slice(-25);
    if (!trend.length) return `<div class="rg-empty">No incorporation dates available.</div>`;
    const w = 760, h = 250, pad = 32, max = Math.max(1, ...trend.map(d => d.count));
    const step = trend.length > 1 ? (w - pad*2) / (trend.length - 1) : 0;
    const points = trend.map((d,i) => [pad + i*step, h-pad - (d.count/max)*(h-pad*2)]);
    const path = points.map((p,i) => `${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const bars = trend.map((d,i) => {
      const x = pad + i*step - Math.max(4, step*.28)/2;
      const bh = (d.count/max)*(h-pad*2);
      return `<rect x="${x}" y="${h-pad-bh}" width="${Math.max(4, step*.28)}" height="${bh}" rx="3" fill="rgba(95,168,160,.35)"><title>${d.year}: ${d.count}</title></rect>`;
    }).join('');
    const labels = trend.filter((_,i)=> i===0 || i===trend.length-1 || i%5===0).map((d,i) => {
      const idx = trend.indexOf(d), x = pad + idx*step;
      return `<text x="${x}" y="${h-8}" text-anchor="middle" fill="#9AA5B5" font-size="10">${d.year}</text>`;
    }).join('');
    return `<svg class="rg-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img" aria-label="Incorporation trend chart"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#334154"/>${bars}<path d="${path}" fill="none" stroke="#C99A4B" stroke-width="3" vector-effect="non-scaling-stroke"/>${points.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#F0EADC"><title>${trend[i].year}: ${trend[i].count}</title></circle>`).join('')}${labels}</svg>`;
  }

  function renderTable(rows, type, limit = 10) {
    rows = (rows || []).slice(0, limit);
    if (!rows.length) return `<div class="rg-empty">No ranked rows yet.</div>`;
    const key = type === 'sector' ? 'sic_text' : 'town';
    return `<table class="rg-table"><thead><tr><th>${type === 'sector' ? 'Sector / SIC text' : 'Town'}</th><th class="num">Count</th><th class="num">Recent</th><th class="num">Growth</th><th class="num">Risk</th><th class="num">Score</th></tr></thead><tbody>${rows.map(r => `
      <tr><td>${escapeHtml(r[key])}</td><td class="num">${fmt(r.count)}</td><td class="num">${fmt(r.recent_count)}</td><td class="num">${r.growth_pct === null || r.growth_pct === undefined ? 'new' : `${r.growth_pct}%`}</td><td class="num">${r.risk_rate}%</td><td class="num">${r.opportunity_score}</td></tr>
    `).join('')}</tbody></table>`;
  }

  function renderRadar() {
    const ins = state.insights;
    if (!ins) { els.radar.innerHTML = `<div class="rg-loading">Building market radar…</div>`; return; }
    const topSectors = (ins.sectors || []).slice(0,8);
    const statusRows = Object.entries(ins.status?.categories || {}).map(([name,count]) => ({ name, count })).sort((a,b)=>b.count-a.count);
    els.radar.innerHTML = `
      ${renderEureka(ins)}
      ${renderKpis(ins)}
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Formation pulse</h3><p class="rg-section-sub">New company formation by incorporation year — a registration-activity signal that can move before broader market reports catch up. Not proof of demand.</p>${renderTrendChart(ins.trend)}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Status mix</h3><p class="rg-section-sub">A fast health read for the searched market.</p>${renderBars(statusRows, 'name', 'count', { limit: 7, risk: true })}</div>
      </div>
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Top sector language</h3><p class="rg-section-sub">Useful for keyword strategy, positioning and competitor clustering.</p>${renderBars(topSectors, 'sic_text', 'count', { limit: 8 })}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Aha lens</h3><p class="rg-section-sub">Look for places with rising incorporations but low stress. Look for sectors with high stress as possible consolidation, partnership or warning signals.</p>${renderTable(ins.rankings?.towns_by_opportunity || [], 'town', 6)}</div>
      </div>
    `;
  }

  function initHeatMap() {
    if (heatMap) return;
    heatMap = L.map(root.querySelector("#rg-heatmap"), { scrollWheelZoom: false }).setView([54.5, -3.2], 5.4);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "&copy; OpenStreetMap contributors", maxZoom: 18 }).addTo(heatMap);
  }
  function clearHeatLayers() { heatLayers.forEach(l => heatMap.removeLayer(l)); heatLayers = []; }
  function renderHeatMap() {
    initHeatMap();
    const ins = state.insights;
    const mode = els.heatMode.value || 'count';
    clearHeatLayers();
    if (!ins || !ins.heatmap || !ins.heatmap.points.length) {
      els.heatSummary.innerHTML = `<h3 class="rg-section-title">Heatmap</h3><p class="rg-section-sub">No geocoded postcode districts yet. In live mode, the server geocodes representative postcodes and caches them.</p>`;
      return;
    }
    const points = ins.heatmap.points.filter(p => Number(p[mode] || 0) > 0);
    const maxVal = Math.max(1, ...points.map(p => Number(p[mode] || 0)));
    const color = mode === 'risk_count' ? '#C1574A' : (mode === 'recent_count' ? '#5FA8A0' : '#C99A4B');
    const bounds = [];
    points.forEach(p => {
      const val = Number(p[mode] || 0);
      const radius = 6 + Math.sqrt(val / maxVal) * 38;
      const marker = L.circleMarker([p.lat, p.lon], { radius, color, weight: 1, fillColor: color, fillOpacity: 0.25 + Math.min(.45, val/maxVal*.45) })
        .addTo(heatMap)
        .bindPopup(`<b>${escapeHtml(p.outcode)}</b><br>${mode.replace('_',' ')}: ${fmt(val)}<br>Total: ${fmt(p.count)}<br>Recent: ${fmt(p.recent_count)}<br>Risk: ${fmt(p.risk_count)}`);
      heatLayers.push(marker); bounds.push([p.lat, p.lon]);
    });
    if (bounds.length) heatMap.fitBounds(bounds, { padding: [32,32], maxZoom: 12 });
    const top = points.slice().sort((a,b)=>Number(b[mode]||0)-Number(a[mode]||0)).slice(0,8).map(p => ({ label: p.outcode, value: p[mode], count: p.count }));
    els.heatSummary.innerHTML = `<h3 class="rg-section-title">Full-result heatmap</h3><p class="rg-section-sub">${escapeHtml(ins.heatmap.note || '')}</p>
      <div class="rg-kpi-label">Full matches behind map</div><div class="rg-kpi-value">${fmt(ins.heatmap.full_match_count)}</div><div class="rg-kpi-note">Plotted postcode cells: ${fmt(ins.heatmap.plotted_cells)}</div>
      <div style="margin-top:16px">${renderBars(top, 'label', 'value', { limit: 8, risk: mode==='risk_count' })}</div>
      <p class="rg-footnote">Tip: switch between Density, Recent formation and Stress. Big circles are not individual pins; they are aggregated postcode districts, so a 109k-result market remains readable.</p>`;
    setTimeout(() => heatMap.invalidateSize(), 50);
  }

  function renderTrends() {
    const ins = state.insights;
    if (!ins) { els.trends.innerHTML = `<div class="rg-loading">Building trend view…</div>`; return; }
    els.trends.innerHTML = `
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Time trend in this market</h3><p class="rg-section-sub">Comparison window: recent ${escapeHtml(ins.comparison_window?.recent || '')} vs previous ${escapeHtml(ins.comparison_window?.previous || '')}.${ins.comparison_window?.latest_year_in_trend_is_ytd ? ' Current-year bar is year-to-date and is not used for annual opportunity scoring.' : ''}</p>${renderTrendChart(ins.trend)}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Fastest opportunity towns</h3><p class="rg-section-sub">High recent formation + healthy status mix + useful density.</p>${renderTable(ins.rankings?.towns_by_opportunity || [], 'town', 10)}</div>
      </div>
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Positive sector development</h3><p class="rg-section-sub">Sectors with stronger recent formation signals.</p>${renderTable(ins.rankings?.sectors_by_opportunity || [], 'sector', 10)}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Negative development / stress</h3><p class="rg-section-sub">Higher risk ratio means more companies here are in an insolvency-related status. That's a registry signal, not a confirmed cause — financing pressure, filing delays, sector-wide cost shocks, or other company-specific issues could each be behind it.</p>${renderTable(ins.rankings?.towns_by_risk || [], 'town', 10)}</div>
      </div>`;
  }

  function renderOpportunity() {
    const ins = state.insights;
    if (!ins) { els.opportunity.innerHTML = `<div class="rg-loading">Scoring opportunities…</div>`; return; }
    els.opportunity.innerHTML = `
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Where to attack</h3><p class="rg-section-sub">Locations ranked by the opportunity score. Treat this as a shortlist generator for deeper research.</p>${renderTable(ins.rankings?.towns_by_opportunity || [], 'town', 15)}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Where to be careful</h3><p class="rg-section-sub">High stress can reveal weak economics, oversupply, or a chance to buy/partner if you understand the cause.</p>${renderTable(ins.rankings?.towns_by_risk || [], 'town', 15)}</div>
      </div>
      <div class="rg-split">
        <div class="rg-cardbox"><h3 class="rg-section-title">Sector opportunities</h3>${renderTable(ins.rankings?.sectors_by_opportunity || [], 'sector', 15)}</div>
        <div class="rg-cardbox"><h3 class="rg-section-title">Sector stress</h3>${renderTable(ins.rankings?.sectors_by_risk || [], 'sector', 15)}</div>
      </div>
      <p class="rg-footnote">Score formula is intentionally transparent: recent formation, active-rate and low-risk signals lift the score; saturation and status stress reduce it. Change the formula in companies_house_market_server.py for your own thesis.</p>`;
  }

  function showDetail(item) {
    if (!item) return;
    const m = metaFor(item.status_category);
    els.detail.innerHTML = `<h3>${escapeHtml(item.company_name)}</h3>
      <div class="rg-detail-row">Company no. <b>${escapeHtml(item.company_number)}</b></div>
      <div class="rg-detail-row">Status <b style="color:${m.color}">${escapeHtml(item.status)}</b></div>
      <div class="rg-detail-row">Incorporated <b>${escapeHtml(item.incorporation_date || '—')}</b></div>
      <div class="rg-detail-row">Town / postcode <b>${escapeHtml(item.town || '')} ${escapeHtml(item.postcode || '')}</b></div>
      <div class="rg-detail-row">SIC <b>${escapeHtml(item.sic_text || '—')}</b></div>
      <p class="rg-footnote">Use this company as a qualitative lead: check website, offer, reviews, pricing, hiring and filings before making strategic decisions.</p>`;
  }
  function renderList() {
    const items = state.items || [], total = state.total || 0;
    els.count.textContent = items.length === total ? `${fmt(total)} registered businesses found` : `Showing ${fmt(items.length)} of ${fmt(total)} matches. Insights above use the full ${fmt(total)}.`;
    if (!items.length) { els.list.innerHTML = `<div class="rg-empty">No matches. Try a broader keyword or clear the place filter.</div>`; return; }
    const rows = items.map((item, idx) => {
      const m = metaFor(item.status_category);
      return `<button class="rg-card ${idx === selectedIndex ? 'selected' : ''}" data-idx="${idx}"><div class="rg-card-name">${escapeHtml(item.company_name)}</div><div class="rg-card-meta"><span class="rg-pill" style="background:${m.color}22;color:${m.color};border-color:${m.color}">${m.chip}</span><span>${escapeHtml(item.company_number)}</span><span>${escapeHtml(item.incorporation_date || '')}</span></div><div class="rg-card-sic">${escapeHtml(item.sic_text || '')} · ${escapeHtml(item.town || '')} ${escapeHtml(item.postcode || '')}</div></button>`;
    }).join('');
    const loadMore = (isLive && items.length < total) ? `<button class="rg-loadmore" id="rg-loadmore">Load more (${fmt(total - items.length)} remaining)</button>` : "";
    els.list.innerHTML = rows + loadMore;
    els.list.querySelectorAll('.rg-card').forEach(btn => btn.addEventListener('click', () => { selectedIndex = Number(btn.dataset.idx); renderList(); showDetail(state.items[selectedIndex]); }));
    const more = els.list.querySelector('#rg-loadmore');
    if (more) more.addEventListener('click', () => doSearch(false));
  }

  async function loadInsights() {
    state.insights = isLive ? await fetchLiveInsights() : demoInsights();
    renderRadar(); renderTrends(); renderOpportunity(); renderHeatMap();
  }
  async function doSearch(reset) {
    if (reset) { state.offset = 0; state.items = []; selectedIndex = null; els.detail.innerHTML = `<h3>Select a company</h3><p class="rg-detail-row">Use this tab to inspect the rows behind the market signal.</p>`; }
    setLiveBadge();
    if (isLive) {
      const data = await fetchLivePage(reset);
      state.total = data.total_count || 0;
      state.items = reset ? (data.results || []) : state.items.concat(data.results || []);
      state.offset = state.items.length;
    } else {
      const filtered = applyDemoFilters();
      state.total = filtered.length;
      state.items = filtered;
    }
    renderList();
    if (reset) await loadInsights();
    els.export.href = isLive ? ("/api/export.csv?" + paramsToQuery({ limit: 50000 })) : "#";
  }

  function debounce(fn, ms) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
  const debouncedSearch = debounce(() => doSearch(true), 220);
  els.q.addEventListener('input', debouncedSearch);
  els.place.addEventListener('input', debouncedSearch);
  els.statusGroup.addEventListener('click', (e) => {
    const btn = e.target.closest('.rg-status-btn'); if (!btn) return;
    categoryFilter = btn.dataset.category;
    els.statusGroup.querySelectorAll('.rg-status-btn').forEach(b => b.classList.toggle('active', b === btn));
    doSearch(true);
  });
  els.heatMode.addEventListener('change', renderHeatMap);
  root.querySelectorAll('.rg-tab').forEach(tab => tab.addEventListener('click', () => {
    root.querySelectorAll('.rg-tab').forEach(t => t.classList.toggle('active', t === tab));
    root.querySelectorAll('.rg-panel').forEach(p => p.classList.remove('active'));
    root.querySelector(`#rg-panel-${tab.dataset.tab}`).classList.add('active');
    if (tab.dataset.tab === 'heatmap') setTimeout(() => { initHeatMap(); heatMap.invalidateSize(); renderHeatMap(); }, 60);
  }));
  els.export.addEventListener('click', (e) => { if (!isLive) { e.preventDefault(); alert('CSV export is available when the Flask server is running with live data.'); } });

  checkLiveSource().then(() => doSearch(true));
})();
</script>
