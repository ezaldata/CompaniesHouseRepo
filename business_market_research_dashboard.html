  root.innerHTML = `

      </section>
      <section class="rg-menu-panel" id="rg-menu-explore">

              <div class="rg-filter-label"><span>Location focus</span><strong>Town filter</strong></div>
              <input type="text" id="rg-explore-place" placeholder="Type a town, postcode or district" />
              <button type="button" class="rg-clear-place" id="rg-clear-place" hidden>Clear</button>
            </div>
            <div class="rg-place-autocomplete" id="rg-explore-place-autocomplete"></div>
          </div>
        </div>
        <section class="rg-panel active" id="rg-panel-explore"><div class="rg-loading">Run a search to build the Explore report.</div></section>
      </section>
      <section class="rg-menu-panel" id="rg-menu-act">
        <div class="rg-search-card">
          <h3>Company details</h3>
          <p>Review the individual company records behind the market signal, including status, location, incorporation date and SIC description.</p>
        </div>
        <div class="rg-panel active" id="rg-panel-companies" style="padding-top: 12px;">
          <div class="rg-company-tools">
            <p class="rg-count" id="rg-count"></p>
            <a href="#" class="rg-export" id="rg-export">Export CSV <span style="opacity:.7">(first 50k)</span></a>
          </div>
          <div class="rg-list-wrap">
            <div class="rg-list" id="rg-list"><div class="rg-empty">Run a search to see company records.</div></div>
            <div class="rg-detail" id="rg-detail"><h3>Select a company</h3><p class="rg-detail-row">Use this view to inspect one company at a time.</p></div>
          </div>
        </div>
      </section>
    </div>
  `;

  const els = {
    q: root.querySelector("#rg-q"), export: root.querySelector("#rg-export"),
    explorePlace: root.querySelector("#rg-explore-place"), exploreAutocomplete: root.querySelector("#rg-explore-place-autocomplete"), clearPlace: root.querySelector("#rg-clear-place"),
    statusGroup: root.querySelector("#rg-status-group"), count: root.querySelector("#rg-count"),
    list: root.querySelector("#rg-list"), detail: root.querySelector("#rg-detail"), heatSummary: root.querySelector("#rg-heat-summary"), heatModeButtons: root.querySelectorAll(".rg-map-mode-btn"),
    radar: root.querySelector("#rg-panel-explore"),
    mainMenu: root.querySelectorAll(".rg-menu-btn"), menuPanels: root.querySelectorAll(".rg-menu-panel"), searchBtn: root.querySelector("#rg-search-btn")
  };

  let isLive = false, categoryFilter = [], selectedIndex = null;
  const PAGE_SIZE = 200;
  const state = { items: [], total: 0, offset: 0, insights: null, hasSearched: false, loadingExplore: false, heatMode: 'count' };
  let heatMap = null, heatLayers = [];
  let searchRunId = 0;

  function fmt(n) { return Number(n || 0).toLocaleString(); }
  function pct(n, d) { return d ? ((n / d) * 100).toFixed(1) : "0.0"; }
  function escapeHtml(str) { return String(str ?? "").replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
  function params() {
    const cat = Array.isArray(categoryFilter) ? (categoryFilter.length ? categoryFilter.join('|') : '') : (categoryFilter || '');
    return { q: els.q.value.trim(), place: els.explorePlace?.value?.trim() || '', category: cat };
  }
  function paramsToQuery(extra = {}) { const p = new URLSearchParams({ ...params(), ...extra }); return p.toString(); }
  function setLiveBadge() { /* badge removed from UI; keep isLive state for logic only */ }

  async function checkLiveSource() {
    try {
      const ctrl = new AbortController();

      if (res.ok) isLive = true;

    setLiveBadge();
  }

  async function fetchLivePage(reset) {

    const res = await fetch("/api/search?" + paramsToQuery({ limit: PAGE_SIZE, offset, geocode: "0" }));

  }
  async function fetchLiveInsights() {
    const res = await fetch("/api/insights?" + paramsToQuery({ heatmap_limit: 900, min_group: 2 }));

  function applyDemoFilters() {
    const q = els.q.value.trim().toLowerCase();
    const place = els.explorePlace?.value?.trim().toLowerCase() || "";
    return DEMO_DATA.filter((item) => {
      const matchesQ = !q || item.company_name.toLowerCase().includes(q) || (item.sic_text || "").toLowerCase().includes(q);
      const matchesPlace = !place || (item.town || "").toLowerCase().includes(place) || (item.postcode || "").toLowerCase().includes(place);
      const matchesCategory = !categoryFilter || (Array.isArray(categoryFilter) ? categoryFilter.length === 0 || categoryFilter.includes(item.status_category) : item.status_category === categoryFilter);
      return matchesQ && matchesPlace && matchesCategory;
    });
  }

  function groupBy(arr, keyFn) {
    const map = new Map();
    arr.forEach((item) => {
      const key = keyFn(item) || "UNKNOWN";
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(item);
    });
    return map;
  }
  function demoInsights() {
    const items = applyDemoFilters();
    const total = items.length;
    const categoryCounts = {};
    items.forEach(i => { categoryCounts[i.status_category] = (categoryCounts[i.status_category] || 0) + 1; });
    const years = [...groupBy(items, i => i.incorporation_year).entries()].filter(([y]) => y).sort((a,b) => Number(a[0]) - Number(b[0]));
    const trend = years.map(([year, rows]) => ({ year: Number(year), count: rows.length }));
    const maxYear = trend.length ? trend[trend.length - 1].year : new Date().getFullYear();
    const recentStart = maxYear - 1, prevStart = maxYear - 3, prevEnd = maxYear - 2;
    function groupStats(map, labelName) {
      return [...map.entries()].map(([label, rows]) => {
        const count = rows.length;
        const active = rows.filter(r => r.status_category === "Active").length;
        const risk = rows.filter(r => NEGATIVE_CATEGORIES.has(r.status_category)).length;
        const recent = rows.filter(r => r.incorporation_year >= recentStart && r.incorporation_year <= maxYear).length;
        const previous = rows.filter(r => r.incorporation_year >= prevStart && r.incorporation_year <= prevEnd).length;
        const growth = previous ? Number((((recent - previous) / previous) * 100).toFixed(1)) : null;
        const activeRate = Number(pct(active, count)), riskRate = Number(pct(risk, count));
        const growthBonus = previous === 0 && recent > 0 ? 20 : Math.max(-20, Math.min(30, (growth || 0) / 4));
        const score = Number((recent * 1.8 + activeRate * .35 - riskRate * .9 + growthBonus - Math.log10(Math.max(count,1))*3.5).toFixed(1));
        return { [labelName]: label, count, active_count: active, risk_count: risk, recent_count: recent, previous_count: previous, growth_pct: growth, active_rate: activeRate, risk_rate: riskRate, opportunity_score: score };
      }).sort((a,b) => b.count - a.count);
    }
    const towns = groupStats(groupBy(items, i => i.town), "town");
    const sectors = groupStats(groupBy(items, i => i.sic_text), "sic_text");
    const points = [...groupBy(items, i => (i.postcode || '').split(' ')[0]).entries()].map(([outcode, rows]) => {
      const count = rows.length;
      return {
        outcode,
        postcode: outcode,
        lat: rows.reduce((sum, row) => sum + Number(row.lat || 0), 0) / count,
        lon: rows.reduce((sum, row) => sum + Number(row.lon || 0), 0) / count,
        count,
        risk_count: rows.filter(row => NEGATIVE_CATEGORIES.has(row.status_category)).length,
        recent_count: rows.filter(row => row.incorporation_year >= recentStart).length,
        intensity: count
      };
    });
    const active = categoryCounts.Active || 0;
    const eureka = [
      { sentiment: active / Math.max(total, 1) >= .85 ? "positive" : "warning", title: "Company health", value: `${pct(active,total)}% active`, note: `${fmt(total-active)} companies are not listed as Active.` },
      trend.length >= 2 ? { sentiment: trend[trend.length-1].count >= trend[trend.length-2].count ? "positive" : "negative", title: "Newest companies", value: `${trend[trend.length-1].year}: ${trend[trend.length-1].count}`, note: `${trend[trend.length-2].year} had ${trend[trend.length-2].count}.` } : { sentiment: "neutral", title: "Newest companies", value: "Not enough data", note: "Use live data for a clearer view." },
      towns[0] ? { sentiment: "positive", title: "Best town to check", value: towns.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score)[0].town, note: "This town has the highest opportunity score in these results." } : { sentiment: "neutral", title: "No town found", value: "—", note: "Try a broader search." }
    ];
    return { total_count: total, max_incorporation_year: maxYear, comparison_window: { recent: `${recentStart}-${maxYear}`, previous: `${prevStart}-${prevEnd}` }, status: { categories: categoryCounts, raw: [] }, trend, towns, sectors, rankings: { towns_by_opportunity: towns.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score), towns_by_risk: towns.slice().sort((a,b)=>b.risk_rate-a.risk_rate), sectors_by_opportunity: sectors.slice().sort((a,b)=>b.opportunity_score-a.opportunity_score), sectors_by_risk: sectors.slice().sort((a,b)=>b.risk_rate-a.risk_rate) }, heatmap: { points, full_match_count: total, plotted_cells: points.length, note: "Demo points are fictional; live mode uses aggregated postcode districts." }, eureka };
  }

  function renderBars(items, labelKey, valueKey, options = {}) {
    const rows = (items || []).slice(0, options.limit || 8);
    const max = Math.max(1, ...rows.map(r => Number(r[valueKey] || 0)));
    if (!rows.length) return `<div class="rg-empty">No data yet.</div>`;
    return `<div class="rg-bars">${rows.map(r => `
      <div class="rg-bar-row"><div class="rg-bar-label" title="${escapeHtml(r[labelKey])}">${escapeHtml(r[labelKey])}</div><div class="rg-bar-track"><div class="rg-bar-fill ${options.risk ? 'risk' : ''}" style="width:${Math.max(2, (Number(r[valueKey] || 0) / max) * 100)}%"></div></div><div class="num">${fmt(r[valueKey])}</div></div>
    `).join('')}</div>`;
  }

  function renderTrendChart(trend) {
    trend = (trend || []).slice(-25);
    if (!trend.length) return `<div class="rg-empty">No incorporation dates available.</div>`;
    const w = 760, h = 270, padLeft = 48, padRight = 24, padTop = 24, padBottom = 38, max = Math.max(1, ...trend.map(d => d.count));
    const chartW = w - padLeft - padRight, chartH = h - padTop - padBottom;
    const step = trend.length > 1 ? chartW / (trend.length - 1) : 0;
    const yFor = (count) => padTop + chartH - (count/max)*chartH;
    const points = trend.map((d,i) => [padLeft + i*step, yFor(d.count)]);
    const path = points.map((p,i) => `${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const tickValues = [...new Set([max, Math.round(max * .75), Math.round(max * .5), Math.round(max * .25), 0])].sort((a,b)=>b-a);
    const yAxis = tickValues.map(v => {
      const y = yFor(v);
      return `<g><line x1="${padLeft}" y1="${y}" x2="${w-padRight}" y2="${y}" stroke="#dce6ee" stroke-width="1"/><text x="${padLeft-9}" y="${y+3}" text-anchor="end" fill="#667789" font-size="10">${fmt(v)}</text></g>`;
    }).join('');
    const bars = trend.map((d,i) => {
      const barW = Math.max(5, Math.min(22, step*.32 || 14));
      const x = padLeft + i*step - barW/2;
      const bh = (d.count/max)*chartH;
      return `<rect x="${x}" y="${padTop + chartH - bh}" width="${barW}" height="${bh}" rx="3" fill="rgba(95,168,160,.38)"><title>${d.year}: ${d.count}</title></rect>`;
    }).join('');
    const yearFontSize = trend.length > 18 ? 8 : (trend.length > 12 ? 9 : 10);
    const labels = trend.map((d, idx) => {
      const x = padLeft + idx*step;
      return `<text x="${x}" y="${h-11}" text-anchor="middle" fill="#7C8A9A" font-size="${yearFontSize}">${d.year}</text>`;
    }).join('');
    return `<svg class="rg-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img" aria-label="Incorporation trend chart"><rect x="${padLeft}" y="${padTop}" width="${chartW}" height="${chartH}" fill="rgba(255,255,255,.38)" rx="8"/>${yAxis}<line x1="${padLeft}" y1="${padTop + chartH}" x2="${w-padRight}" y2="${padTop + chartH}" stroke="#334154"/>${bars}<path d="${path}" fill="none" stroke="#C99A4B" stroke-width="3" vector-effect="non-scaling-stroke"/>${points.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#F0EADC" stroke="#C99A4B" stroke-width="1"><title>${trend[i].year}: ${trend[i].count}</title></circle>`).join('')}${labels}<text x="12" y="${padTop + chartH/2}" transform="rotate(-90 12 ${padTop + chartH/2})" text-anchor="middle" fill="#667789" font-size="10">Companies</text></svg>`;
  }

  function renderTable(rows, type, limit = 10) {
    rows = (rows || []).slice(0, limit);
    if (!rows.length) return `<div class="rg-empty">No ranked rows yet.</div>`;
    const key = type === 'sector' ? 'sic_text' : 'town';
    return `<table class="rg-table"><thead><tr><th>${type === 'sector' ? 'Sector / SIC text' : 'Town'}</th><th class="num">Count</th><th class="num">Recent</th><th class="num">Growth</th><th class="num">Risk</th><th class="num">Score</th></tr></thead><tbody>${rows.map(r => `
      <tr><td>${escapeHtml(r[key])}</td><td class="num">${fmt(r.count)}</td><td class="num">${fmt(r.recent_count)}</td><td class="num">${r.growth_pct === null || r.growth_pct === undefined ? 'new' : `${r.growth_pct}%`}</td><td class="num">${r.risk_rate}%</td><td class="num">${r.opportunity_score}</td></tr>
    `).join('')}</tbody></table>`;
  }

  function renderHealthMeter(statusRows, total) {
    const max = Math.max(1, ...statusRows.map(r => r.count));
    if (!statusRows.length) return `<div class="rg-empty">No status data yet.</div>`;
    return `<div class="rg-health-meter">${statusRows.slice(0, 5).map(r => {
      const meta = metaFor(r.name);
      const tone = NEGATIVE_CATEGORIES.has(r.name) ? 'negative' : (r.name === 'Active - At Risk' ? 'warning' : '');
      return `<div class="rg-meter-row"><span title="${escapeHtml(r.name)}">${escapeHtml(meta.chip || r.name)}</span><div class="rg-meter-track"><div class="rg-meter-fill ${tone}" style="width:${Math.max(3, (r.count / max) * 100)}%; background:${meta.color}"></div></div><span>${pct(r.count,total)}%</span></div>`;
    }).join('')}</div>`;
  }

  function renderSectorChips(sectors) {
    const rows = (sectors || []).slice(0, 7);
    if (!rows.length) return `<div class="rg-empty">No sector data yet.</div>`;
    const total = rows.reduce((sum, r) => sum + Number(r.count || 0), 0);
    const max = Math.max(1, ...rows.map(r => Number(r.count || 0)));
    return `<div class="rg-sector-viz">${rows.map(r => {
      const label = String(r.sic_text || 'Unknown').replace(/^\d+\s*-\s*/, '');
      const value = Number(r.count || 0);
      const share = total ? Math.round((value / total) * 100) : 0;
      return `<div class="rg-sector-row" title="${escapeHtml(r.sic_text)}"><div class="rg-sector-name">${escapeHtml(label)}</div><div class="rg-sector-track"><div class="rg-sector-fill" style="width:${Math.max(4, (value / max) * 100)}%"></div></div><div class="rg-sector-meta">${fmt(value)} · ${share}%</div></div>`;
    }).join('')}</div>`;
  }

  function renderTownShortlist(towns) {
    const rows = (towns || []).slice(0, 5);
    if (!rows.length) return `<div class="rg-empty">No town ranking yet.</div>`;
    return `<div class="rg-town-shortlist">${rows.map((r, i) => {
      const growth = r.growth_pct === null || r.growth_pct === undefined ? 'new local activity' : `${r.growth_pct}% recent growth`;
      const reason = `${growth}; ${r.active_rate}% active`;
      return `<div class="rg-town-row"><div class="rg-town-rank">${i + 1}</div><div><div class="rg-town-name">${escapeHtml(r.town)}</div><div class="rg-town-reason">${escapeHtml(reason)}</div></div><div class="rg-town-score">${escapeHtml(r.opportunity_score)}</div></div>`;
    }).join('')}</div>`;
  }

  function renderOverviewReport(ins) {
    const total = ins.total_count || 0;
    const cat = ins.status?.categories || {};
    const active = cat.Active || 0;
    const risk = Object.keys(cat).filter(k => NEGATIVE_CATEGORIES.has(k)).reduce((s,k)=>s+cat[k],0);
    const activeRate = Number(pct(active, total));
    const riskRate = Number(pct(risk, total));
    const trend = ins.trend || [];
    const latest = trend.length ? trend[trend.length - 1] : null;
    const previous = trend.length > 1 ? trend[trend.length - 2] : null;
    const topTown = (ins.rankings?.towns_by_opportunity || [])[0];
    const topSector = (ins.sectors || [])[0];
    const statusRows = Object.entries(cat).map(([name,count]) => ({ name, count })).sort((a,b)=>b.count-a.count);
    const carefulTowns = (ins.towns || ins.rankings?.towns_by_opportunity || ins.rankings?.towns_by_risk || [])
      .slice()
      .sort((a,b) => Number(a.opportunity_score ?? 0) - Number(b.opportunity_score ?? 0));
    const healthTone = riskRate >= 20 ? 'mixed' : (activeRate >= 85 ? 'healthy' : 'selective');
    const activityText = latest && previous
      ? (latest.count >= previous.count ? `New registrations are holding up, with ${latest.count} started in ${latest.year}.` : `New registrations eased in ${latest.year}, so check whether demand is cooling or just delayed.`)
      : 'There is not enough yearly history yet to call the direction.';
    const sectorName = topSector ? String(topSector.sic_text || '').replace(/^\d+\s*-\s*/, '') : 'the searched sector';
    const townName = topTown ? topTown.town : 'No clear town yet';

    return `
      <div class="rg-report">
        <section class="rg-report-hero">
          <div>
            <p class="rg-report-kicker">Overview brief</p>
            <h3 class="rg-report-title">A ${healthTone} market with ${fmt(total)} matching companies</h3>
            <p class="rg-report-copy">The strongest read is ${escapeHtml(townName)} for location focus and ${escapeHtml(sectorName)} as the most common business type. Use this page as a quick market read before moving into the map, trends or company list.</p>
          </div>
          <div class="rg-report-stats">
            <div class="rg-stat-line"><span>Active</span><strong>${activeRate}%</strong></div>
            <div class="rg-stat-line"><span>At risk</span><strong>${riskRate}%</strong></div>
            <div class="rg-stat-line"><span>Latest year</span><strong>${latest ? fmt(latest.count) : '—'}</strong></div>
          </div>
        </section>

        <div class="rg-insight-grid">
          <div class="rg-insight-card ${riskRate >= 20 ? 'warning' : 'positive'}"><h3>Health</h3><span class="rg-insight-value">${riskRate < 10 ? 'Low risk' : (riskRate < 20 ? 'Watch list' : 'Higher risk')}</span><p>${fmt(active)} companies are active. ${fmt(risk)} are in an at-risk, insolvency or liquidation status.</p></div>
          <div class="rg-insight-card ${latest && previous && latest.count < previous.count ? 'negative' : 'positive'}"><h3>Momentum</h3><span class="rg-insight-value">${latest ? latest.year : '—'}</span><p>${escapeHtml(activityText)}</p></div>
          <div class="rg-insight-card positive"><h3>Focus</h3><span class="rg-insight-value">${escapeHtml(townName)}</span><p>This is the best first place to inspect because it combines activity, health and local density.</p></div>
        </div>

        <div class="rg-split">
          <div class="rg-cardbox"><h3 class="rg-section-title">Market activity</h3><p class="rg-section-sub">Yearly incorporations show how much new company activity is appearing in the register.</p>${renderTrendChart(ins.trend)}</div>
          <div class="rg-cardbox"><h3 class="rg-section-title">Health mix</h3><p class="rg-section-sub">Statuses are grouped into plain business-health categories.</p>${renderHealthMeter(statusRows, total)}</div>
        </div>

        <div class="rg-split">
          <div class="rg-cardbox"><h3 class="rg-section-title">Business types</h3><p class="rg-section-sub">The main types of companies found in this search.</p>${renderSectorChips(ins.sectors || [])}</div>
          <div class="rg-cardbox"><h3 class="rg-section-title">Where to look first</h3><p class="rg-section-sub">A short location list instead of a dense table. Higher score means a better first research target.</p>${renderTownShortlist(ins.rankings?.towns_by_opportunity || [])}</div>
        </div>

        <div class="rg-map-layout">
          <div class="rg-map-card">
            <div class="rg-map-tools">
              <button type="button" class="rg-map-mode-btn active" data-heat-mode="count"><strong>Density</strong><span>Where companies cluster</span></button>
              <button type="button" class="rg-map-mode-btn" data-heat-mode="recent_count"><strong>Recent formation</strong><span>Newer company activity</span></button>
              <button type="button" class="rg-map-mode-btn" data-heat-mode="risk_count"><strong>Stress / risk</strong><span>Areas needing caution</span></button>
            </div>
            <div class="rg-map-legend" id="rg-map-legend">
              <div class="rg-map-legend-title">Heat intensity</div>
              <div class="rg-map-legend-scale" id="rg-map-legend-scale"></div>
              <div class="rg-map-legend-row"><span>Low</span><span>High</span></div>
            </div>
            <div id="rg-heatmap"></div>
          </div>
          <div id="rg-heat-summary" class="rg-cardbox"><div class="rg-loading">Loading map summary...</div></div>
        </div>

        <div class="rg-split">
          <div class="rg-cardbox"><h3 class="rg-section-title">Location opportunities</h3><p class="rg-section-sub">Places ranked by recent activity, health and useful local density.</p>${renderTable(ins.rankings?.towns_by_opportunity || [], 'town', 10)}</div>
          <div class="rg-cardbox"><h3 class="rg-section-title">Locations to check carefully</h3><p class="rg-section-sub">Sorted by lowest score first. These places need more caution before acting.</p>${renderTable(carefulTowns, 'town', 10)}</div>
        </div>

        <div class="rg-split">
          <div class="rg-cardbox"><h3 class="rg-section-title">Sector opportunities</h3><p class="rg-section-sub">Business types with stronger recent formation and healthier status mix.</p>${renderTable(ins.rankings?.sectors_by_opportunity || [], 'sector', 10)}</div>
          <div class="rg-cardbox"><h3 class="rg-section-title">Sector stress</h3><p class="rg-section-sub">Business types where the status mix needs more care before acting.</p>${renderTable(ins.rankings?.sectors_by_risk || [], 'sector', 10)}</div>
        </div>
      </div>`;
  }

  function renderRadar() {
    const ins = state.insights;
    if (state.loadingExplore) { els.radar.innerHTML = renderExploreProgress(); return; }
    if (!state.hasSearched) { els.radar.innerHTML = renderExploreIdle(); return; }
    if (!ins) { els.radar.innerHTML = `<div class="rg-loading">Building market report...</div>`; return; }
    heatMap = null;
    heatLayers = [];
    els.radar.innerHTML = renderOverviewReport(ins);
    els.heatSummary = root.querySelector("#rg-heat-summary");
    els.heatModeButtons = root.querySelectorAll(".rg-map-mode-btn");
    els.heatModeButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.heatMode === state.heatMode);
      btn.setAttribute('aria-pressed', String(btn.dataset.heatMode === state.heatMode));
      btn.addEventListener('click', () => {
        state.heatMode = btn.dataset.heatMode || 'count';
        els.heatModeButtons.forEach(modeBtn => {
          const active = modeBtn.dataset.heatMode === state.heatMode;
          modeBtn.classList.toggle('active', active);
          modeBtn.setAttribute('aria-pressed', String(active));
        });
        renderHeatMap();
      });
    });
  }

  const UK_MAP_BOUNDS = [[49.75, -8.65], [60.95, 1.85]];

  function initHeatMap() {
    if (heatMap) return;
    const mapEl = root.querySelector("#rg-heatmap");
    if (!mapEl) return;
    heatMap = L.map(mapEl, { scrollWheelZoom: false, zoomSnap: 0.25, maxBounds: UK_MAP_BOUNDS, maxBoundsViscosity: 1 }).fitBounds(UK_MAP_BOUNDS, { padding: [10, 10] });
    heatMap.setMinZoom(heatMap.getZoom());
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { attribution: "&copy; OpenStreetMap contributors &copy; CARTO", maxZoom: 18, noWrap: true, bounds: UK_MAP_BOUNDS }).addTo(heatMap);
  }
  function clearHeatLayers() { if (!heatMap) return; heatLayers.forEach(l => heatMap.removeLayer(l)); heatLayers = []; }
  function renderHeatMap() {
    initHeatMap();
    if (!heatMap || !els.heatSummary) return;
    const ins = state.insights;
    const mode = state.heatMode || 'count';
    clearHeatLayers();
    if (!ins || !ins.heatmap || !ins.heatmap.points.length) {
      els.heatSummary.innerHTML = `<h3 class="rg-section-title">Heatmap</h3><p class="rg-section-sub">No geocoded postcode districts yet. In live mode, the server geocodes representative postcodes and caches them.</p>`;
      return;
    }
    const points = ins.heatmap.points.filter(p => Number(p[mode] || 0) > 0);
    if (!points.length) {
      els.heatSummary.innerHTML = `<h3 class="rg-section-title">Map view</h3><p class="rg-section-sub">No postcode areas have a value for this map mode yet.</p>`;
      return;
    }
    const values = points.map(p => Number(p[mode] || 0));
    const maxVal = Math.max(1, ...values);
    const minVal = Math.min(...values);
    const valueRange = Math.max(0, maxVal - minVal);
    const color = '#E2572F';
    const modeLabel = mode === 'risk_count' ? 'Risk signal' : (mode === 'recent_count' ? 'Recent formation' : 'Market density');
    const gradient = { 0.18: '#1D4F91', 0.38: '#008F8C', 0.62: '#F0B83F', 0.82: '#E2572F', 1: '#7A1236' };
    const gradientCss = 'linear-gradient(90deg, #1D4F91, #008F8C, #F0B83F, #E2572F, #7A1236)';
    const legend = root.querySelector("#rg-map-legend");
    if (legend) {
      const title = legend.querySelector(".rg-map-legend-title");
      const scale = legend.querySelector("#rg-map-legend-scale");
      if (title) title.textContent = `${modeLabel} heat`;
      if (scale) scale.style.background = gradientCss;
    }
    const intensityFor = (value) => valueRange
      ? 0.16 + Math.pow((value - minVal) / valueRange, 0.72) * 0.84
      : 0.58;
    const colorForIntensity = (intensity) => {
      if (intensity >= 0.9) return gradient[1];
      if (intensity >= 0.74) return gradient[0.86] || gradient[0.82];
      if (intensity >= 0.5) return gradient[0.68] || gradient[0.62];
      if (intensity >= 0.28) return gradient[0.42] || gradient[0.38];
      return gradient[0.18];
    };
    const bounds = [];
    if (L.heatLayer) {
      const heatPoints = points.map(p => [p.lat, p.lon, intensityFor(Number(p[mode] || 0))]);
      const heatLayer = L.heatLayer(heatPoints, { radius: 36, blur: 22, max: 1, minOpacity: 0.18, maxZoom: 12, gradient }).addTo(heatMap);
      heatLayers.push(heatLayer);
      points.forEach(p => {
        const val = Number(p[mode] || 0);
        const intensity = intensityFor(val);
        const marker = L.circleMarker([p.lat, p.lon], { radius: 3 + intensity * 3, color: '#101827', weight: 1, opacity: 0.9, fillColor: colorForIntensity(intensity), fillOpacity: 0.5 + intensity * 0.38 })
          .addTo(heatMap)
          .bindPopup(`<b>${escapeHtml(p.outcode)}</b><br>${modeLabel}: ${fmt(val)}<br>Total: ${fmt(p.count)}<br>Recent: ${fmt(p.recent_count)}<br>Risk: ${fmt(p.risk_count)}`);
        heatLayers.push(marker); bounds.push([p.lat, p.lon]);
      });
    } else {
      points.forEach(p => {
        const val = Number(p[mode] || 0);
        const intensity = intensityFor(val);
        const radius = 7 + Math.sqrt(intensity) * 34;
        const marker = L.circleMarker([p.lat, p.lon], { radius, color: colorForIntensity(intensity), weight: 2, opacity: 0.9, fillColor: colorForIntensity(intensity), fillOpacity: 0.2 + intensity * 0.52 })
          .addTo(heatMap)
          .bindPopup(`<b>${escapeHtml(p.outcode)}</b><br>${modeLabel}: ${fmt(val)}<br>Total: ${fmt(p.count)}<br>Recent: ${fmt(p.recent_count)}<br>Risk: ${fmt(p.risk_count)}`);
        heatLayers.push(marker); bounds.push([p.lat, p.lon]);
      });
    }
    heatMap.fitBounds(UK_MAP_BOUNDS, { padding: [10, 10] });
    const top = points.slice().sort((a,b)=>Number(b[mode]||0)-Number(a[mode]||0)).slice(0,8).map(p => ({ label: p.outcode, value: p[mode], count: p.count }));
    const topCell = top[0];
    els.heatSummary.innerHTML = `<h3 class="rg-section-title">Map view</h3><p class="rg-section-sub">${escapeHtml(modeLabel)} by postcode area. ${escapeHtml(ins.heatmap.note || '')}</p>
      <div class="rg-map-summary-grid">
        <div class="rg-map-stat"><span>Matches</span><strong>${fmt(ins.heatmap.full_match_count)}</strong></div>
        <div class="rg-map-stat"><span>Areas</span><strong>${fmt(ins.heatmap.plotted_cells)}</strong></div>
        <div class="rg-map-stat"><span>Top area</span><strong>${escapeHtml(topCell ? topCell.label : '—')}</strong></div>
        <div class="rg-map-stat"><span>Top signal</span><strong>${fmt(topCell ? topCell.value : 0)}</strong></div>
      </div>
      <div style="margin-top:16px">${renderBars(top, 'label', 'value', { limit: 8, risk: mode==='risk_count' })}</div>
      <p class="rg-footnote">Switch the heatmap between density, recent formation and risk. Heat is aggregated by postcode area; small points are clickable area references.</p>`;
    setTimeout(() => heatMap.invalidateSize(), 50);
  }

  function showDetail(item) {
    if (!item) return;
    const m = metaFor(item.status_category);
    els.detail.innerHTML = `<h3>${escapeHtml(item.company_name)}</h3>
      <div class="rg-detail-row">Company no. <b>${escapeHtml(item.company_number)}</b></div>
      <div class="rg-detail-row">Status <b style="color:${m.color}">${escapeHtml(item.status)}</b></div>
      <div class="rg-detail-row">Incorporated <b>${escapeHtml(item.incorporation_date || '—')}</b></div>
      <div class="rg-detail-row">Town / postcode <b>${escapeHtml(item.town || '')} ${escapeHtml(item.postcode || '')}</b></div>
      <div class="rg-detail-row">SIC <b>${escapeHtml(item.sic_text || '—')}</b></div>
      <p class="rg-footnote">Use this company as a qualitative lead: check website, offer, reviews, pricing, hiring and filings before making strategic decisions.</p>`;
  }
  function renderList() {
    const items = state.items || [], total = state.total || 0;
    els.count.textContent = items.length === total ? `${fmt(total)} registered businesses found` : `Showing ${fmt(items.length)} of ${fmt(total)} matches. Insights above use the full ${fmt(total)}.`;
    if (!items.length) { els.list.innerHTML = `<div class="rg-empty">No matches. Try a broader keyword or clear the place filter.</div>`; return; }
    const rows = items.map((item, idx) => {
      const m = metaFor(item.status_category);
      return `<button class="rg-card ${idx === selectedIndex ? 'selected' : ''}" data-idx="${idx}"><div class="rg-card-name">${escapeHtml(item.company_name)}</div><div class="rg-card-meta"><span class="rg-pill" style="background:${m.color}22;color:${m.color};border-color:${m.color}">${m.chip}</span><span>${escapeHtml(item.company_number)}</span><span>${escapeHtml(item.incorporation_date || '')}</span></div><div class="rg-card-sic">${escapeHtml(item.sic_text || '')} · ${escapeHtml(item.town || '')} ${escapeHtml(item.postcode || '')}</div></button>`;
    }).join('');
    const loadMore = (isLive && items.length < total) ? `<button class="rg-loadmore" id="rg-loadmore">Load more (${fmt(total - items.length)} remaining)</button>` : "";
    els.list.innerHTML = rows + loadMore;
    els.list.querySelectorAll('.rg-card').forEach(btn => btn.addEventListener('click', () => { selectedIndex = Number(btn.dataset.idx); renderList(); showDetail(state.items[selectedIndex]); }));
    const more = els.list.querySelector('#rg-loadmore');
    if (more) more.addEventListener('click', () => doSearch(false));
  }

  async function loadInsights(preloadedInsights) {
    state.insights = preloadedInsights !== undefined ? preloadedInsights : (isLive ? await fetchLiveInsights() : demoInsights());
    state.loadingExplore = false;
    renderRadar();
    renderHeatMap();
  }
  async function doSearch(reset) {
    const runId = reset ? ++searchRunId : searchRunId;
    if (reset) { state.hasSearched = true; state.offset = 0; state.items = []; selectedIndex = null; els.detail.innerHTML = `<h3>Select a company</h3><p class="rg-detail-row">Use this tab to inspect the rows behind the market signal.</p>`; }
    setLiveBadge();
    let insightsData;
    if (isLive) {
      const [data, insights] = reset
        ? await Promise.all([fetchLivePage(reset), fetchLiveInsights()])
        : [await fetchLivePage(reset), undefined];
      if (runId !== searchRunId) return;
      insightsData = insights;
      state.total = data.total_count || 0;
      state.items = reset ? (data.results || []) : state.items.concat(data.results || []);
      state.offset = state.items.length;
    } else {
      const filtered = applyDemoFilters();
      if (runId !== searchRunId) return;
      state.total = filtered.length;
      state.items = filtered;
      insightsData = reset ? demoInsights() : undefined;
    }
    renderList();
    if (reset) await loadInsights(insightsData);
    els.export.href = isLive ? ("/api/export.csv?" + paramsToQuery({ limit: 50000 })) : "#";
  }

  function debounce(fn, ms) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
  const debouncedSearch = debounce(() => { setExploreLoading(); doSearch(true); }, 450);

  function renderExploreProgress() {
    return `<div class="rg-progress-card" role="status" aria-live="polite">
      <h3 class="rg-progress-title">Loading market results</h3>
      <p class="rg-progress-copy">Fetching matching companies, preparing the Explore report and building the map view.</p>
      <div class="rg-progress-track" aria-hidden="true"><div class="rg-progress-fill"></div></div>
      <div class="rg-progress-steps">
        <div class="rg-progress-step">Search</div>
        <div class="rg-progress-step">Analyse</div>
        <div class="rg-progress-step">Build report</div>
      </div>
    </div>`;
  }

  function renderExploreIdle() {
    return `<div class="rg-progress-card">
      <h3 class="rg-progress-title">Explore is ready</h3>
      <p class="rg-progress-copy">Choose your filters and run a search. The market report, heatmap and company results will appear here after the search finishes.</p>
    </div>`;
  }

  function setExploreLoading() {
    state.hasSearched = true;
    state.loadingExplore = true;
    state.insights = null;
    heatMap = null;
    heatLayers = [];
    if (els.radar) els.radar.innerHTML = renderExploreProgress();
  }

  function activateMenu(menuName) {
    els.mainMenu.forEach(btn => btn.classList.toggle('active', btn.dataset.menu === menuName));
    els.menuPanels.forEach(panel => panel.classList.toggle('active', panel.id === `rg-menu-${menuName}`));
  }

  function showMenu(menuName) {
    activateMenu(menuName);
    if (menuName === 'explore') {
      renderRadar();
      setTimeout(() => {
        initHeatMap();
        if (heatMap) heatMap.invalidateSize();
        renderHeatMap();
      }, 60);
    }
  }

  // Status cards: All status visually selects every category and sends no status restriction.
  if (els.statusGroup) {
    const statusButtons = Array.from(els.statusGroup.querySelectorAll('.rg-status-btn'));
    const allButton = statusButtons.find(btn => btn.dataset.category === '');
    const statusOptionButtons = statusButtons.filter(btn => btn.dataset.category);
    function setStatusCards(selected, useAll = false) {
      const selectedSet = new Set(selected);
      const allSelected = useAll || !selected.length || selected.length === statusOptionButtons.length;
      categoryFilter = allSelected ? [] : selected;
      statusButtons.forEach(btn => {
        const isAll = btn.dataset.category === '';
        const isActive = allSelected || (!isAll && selectedSet.has(btn.dataset.category));
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', String(isActive));
      });
    }
    statusButtons.forEach(btn => btn.addEventListener('click', () => {
      if (btn.dataset.category === '') {
        setStatusCards(statusOptionButtons.map(card => card.dataset.category), true);
      } else {
        const allIsActive = allButton?.classList.contains('active');
        const selected = allIsActive
          ? [btn.dataset.category]
          : statusOptionButtons
              .filter(card => card === btn ? !card.classList.contains('active') : card.classList.contains('active'))
              .map(card => card.dataset.category);
        setStatusCards(selected);
      }
    }));
    setStatusCards(statusOptionButtons.map(card => card.dataset.category), true);
  }
  if (els.searchBtn) els.searchBtn.addEventListener('click', async () => {
    activateMenu('explore');
    setExploreLoading();
    await doSearch(true);
  });
  // Set up town autocomplete
  const uniqueTowns = [...new Set(DEMO_DATA.map(d => d.town).sort())];
  // Set up Explore page town filter with autocomplete
  if (els.explorePlace && els.exploreAutocomplete) {
    function updateClearPlace() {
      if (!els.clearPlace) return;
      els.clearPlace.hidden = !els.explorePlace.value.trim();
    }
    function showPlaceSuggestions(value) {
      const filtered = value.trim().length > 0
        ? uniqueTowns.filter(town => town.toLowerCase().includes(value.toLowerCase()))
        : [];
      if (filtered.length > 0) {
        els.exploreAutocomplete.innerHTML = filtered.map(town =>
          `<div class="rg-place-option">${escapeHtml(town)}</div>`
        ).join('');
        els.exploreAutocomplete.classList.add('active');
      } else {
        els.exploreAutocomplete.classList.remove('active');
      }
      updateClearPlace();
    }
    els.explorePlace.addEventListener('input', (e) => {
      showPlaceSuggestions(e.target.value);
      debouncedSearch();
    });
    els.explorePlace.addEventListener('focus', (e) => {
      showPlaceSuggestions(e.target.value);
    });
    els.exploreAutocomplete.addEventListener('click', (e) => {
      if (e.target.classList.contains('rg-place-option')) {
        els.explorePlace.value = e.target.textContent;
        els.exploreAutocomplete.classList.remove('active');
        updateClearPlace();
        setExploreLoading();
        doSearch(true);
      }
    });
    if (els.clearPlace) {
      els.clearPlace.addEventListener('click', () => {
        els.explorePlace.value = '';
        els.exploreAutocomplete.classList.remove('active');
        updateClearPlace();
        setExploreLoading();
        doSearch(true);
        els.explorePlace.focus();
      });
    }
    document.addEventListener('click', (e) => {
      if (!els.explorePlace.contains(e.target) && !els.exploreAutocomplete.contains(e.target) && !els.clearPlace?.contains(e.target)) {
        els.exploreAutocomplete.classList.remove('active');
      }
    });
    updateClearPlace();
  }
  els.export.addEventListener('click', (e) => { if (!isLive) { e.preventDefault(); alert('CSV export is available when the Flask server is running with live data.'); } });
  els.mainMenu.forEach(btn => btn.addEventListener('click', () => {
    showMenu(btn.dataset.menu);
  }));

  checkLiveSource().then(() => {
    if (els.radar) els.radar.innerHTML = renderExploreIdle();
    if (els.count) els.count.textContent = '';
    if (els.export) els.export.href = '#';
  });
})();
</script>
